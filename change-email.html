<!doctype html>
<html lang="en"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Change Email - Student Locker</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
<link href="assets/css/style.css" rel="stylesheet">
</head><body>
<div data-layout="student">
  <div class="page-header"><h2>Change Email</h2></div>
  <form id="emForm" class="sl-card" style="max-width:520px">
    <div class="mb-3"><label class="form-label">Current Email</label><input name="current" type="email" class="form-control" required></div>
    <div class="mb-3"><label class="form-label">New Email</label><input name="next" type="email" class="form-control" required></div>
    <div class="mb-3"><label class="form-label">Confirm New Email</label><input name="confirm" type="email" class="form-control" required></div>
    <div class="d-flex gap-2">
      <button class="btn btn-primary">Update Email</button>
      <a href="profile.html" class="btn btn-outline-secondary">Cancel</a>
    </div>
  </form>
</div>
<script src="assets/js/app.js"></script><script src="assets/js/layout.js"></script><script src="assets/js/validation.js"></script>
<script>
  const f = document.getElementById('emForm');
  f.addEventListener('submit',(e)=>{
    e.preventDefault();
    if(!isEmail(f.next.value)) return slToast('Invalid email','error');
    if(f.next.value !== f.confirm.value) return slToast('Emails do not match','error');
    const u = JSON.parse(localStorage.getItem('sl_user')||'{}'); u.email = f.next.value;
    localStorage.setItem('sl_user', JSON.stringify(u));
    slToast('Email updated','success'); f.reset();
  });
</script>
</body></html>
