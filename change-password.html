<!doctype html>
<html lang="en"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Change Password - Student Locker</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
<link href="assets/css/style.css" rel="stylesheet">
</head><body>
<div data-layout="student">
  <div class="page-header"><h2>Change Password</h2></div>
  <form id="pwForm" class="sl-card" style="max-width:520px">
    <div class="mb-3"><label class="form-label">Current Password</label>
      <div class="password-field"><input name="current" type="password" class="form-control" required>
        <button type="button" class="toggle-pw"><i class="fas fa-eye"></i></button></div></div>
    <div class="mb-3"><label class="form-label">New Password</label>
      <div class="password-field"><input name="next" type="password" class="form-control" required>
        <button type="button" class="toggle-pw"><i class="fas fa-eye"></i></button></div>
      <div class="pw-meter"><div class="bar"></div></div></div>
    <div class="mb-3"><label class="form-label">Confirm New Password</label>
      <div class="password-field"><input name="confirm" type="password" class="form-control" required>
        <button type="button" class="toggle-pw"><i class="fas fa-eye"></i></button></div></div>
    <div class="d-flex gap-2">
      <button class="btn btn-primary">Update Password</button>
      <a href="profile.html" class="btn btn-outline-secondary">Cancel</a>
    </div>
  </form>
</div>
<script src="assets/js/app.js"></script><script src="assets/js/layout.js"></script><script src="assets/js/validation.js"></script>
<script>
  const f = document.getElementById('pwForm');
  bindStrengthMeter(f.next, f.querySelector('.pw-meter'));
  f.addEventListener('submit',(e)=>{
    e.preventDefault();
    if(f.next.value !== f.confirm.value) return slToast('Passwords do not match','error');
    if(passwordStrength(f.next.value) < 2) return slToast('Password too weak','error');
    slToast('Password updated','success'); f.reset();
  });
</script>
</body></html>
