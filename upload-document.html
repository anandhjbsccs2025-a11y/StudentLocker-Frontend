<!doctype html>
<html lang="en"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Upload Document - Student Locker</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
<link href="assets/css/style.css" rel="stylesheet">
</head><body>
<div data-layout="student">
  <div class="page-header"><h2>Upload Document</h2></div>
  <form id="upForm" class="sl-card" style="max-width:720px">
    <div class="row g-3">
      <div class="col-md-6"><label class="form-label">Category</label>
        <select name="category" id="catSel" class="form-select" required>
          <option value="personal">Personal Documents</option>
          <option value="online">Online Certificates</option>
          <option value="offline">Offline Certificates</option>
          <option value="academic">Academic Certificates</option>
        </select></div>
      <div class="col-md-6"><label class="form-label">Document Title</label><input name="title" id="titleInput" class="form-control" placeholder="e.g. Aadhaar" required></div>
      <div class="col-12">
        <label class="form-label">Upload File (PDF, PNG, JPG, JPEG)</label>
        <label class="upload-zone d-block" for="fileInput">
          <input type="file" id="fileInput" name="file" accept=".pdf,.png,.jpg,.jpeg" hidden required>
          <i class="fas fa-cloud-upload-alt"></i>
          <div id="uploadMsg">Click to choose or drag a file here</div>
        </label>
      </div>
      <div class="col-12" id="previewWrap" style="display:none">
        <label class="form-label">Preview</label>
        <div id="previewArea" class="border rounded p-2"></div>
      </div>
      <div class="col-12" id="progWrap" style="display:none">
        <div class="progress"><div class="progress-bar" id="progBar" style="width:0%"></div></div>
      </div>
    </div>
    <div class="mt-4 d-flex gap-2">
      <button class="btn btn-primary" type="submit"><i class="fas fa-upload me-1"></i>Upload</button>
      <button class="btn btn-outline-secondary" type="reset" onclick="resetUpload()">Reset</button>
      <a href="student-dashboard.html" class="btn btn-link">Cancel</a>
    </div>
  </form>
</div>
<script src="assets/js/app.js"></script><script src="assets/js/layout.js"></script><script src="assets/js/dashboard.js"></script>
<script>
  const params = new URLSearchParams(location.search);
  if(params.get('cat')) document.getElementById('catSel').value = params.get('cat');
  if(params.get('title')) document.getElementById('titleInput').value = params.get('title');

  const fileInput = document.getElementById('fileInput');
  const previewArea = document.getElementById('previewArea');
  const previewWrap = document.getElementById('previewWrap');
  const zone = document.querySelector('.upload-zone');
  const allowed = ['application/pdf','image/png','image/jpeg'];

  function readFile(file){
    if(!file) return;
    if(!allowed.includes(file.type)) { slToast('Only PDF, PNG, JPG, JPEG allowed','error'); fileInput.value=''; return; }
    document.getElementById('uploadMsg').textContent = file.name;
    const reader = new FileReader();
    reader.onload = e=>{
      previewWrap.style.display = 'block';
      if(file.type.startsWith('image/')) previewArea.innerHTML = `<img src="${e.target.result}" class="img-fluid rounded" style="max-height:300px">`;
      else previewArea.innerHTML = `<div class="p-3 text-center"><i class="fas fa-file-pdf fa-2x text-danger mb-2"></i><div>${file.name}</div></div>`;
      window._uploadData = { dataUrl:e.target.result, filename:file.name, type:file.type };
    };
    reader.readAsDataURL(file);
  }
  fileInput.addEventListener('change', e=>readFile(e.target.files[0]));
  ['dragover','dragleave','drop'].forEach(ev=>zone.addEventListener(ev, e=>{ e.preventDefault(); zone.classList.toggle('dragover', ev==='dragover'); if(ev==='drop') readFile(e.dataTransfer.files[0]); }));

  document.getElementById('upForm').addEventListener('submit', e=>{
    e.preventDefault();
    if(!window._uploadData) return slToast('Choose a file','error');
    const cat = document.getElementById('catSel').value;
    const title = document.getElementById('titleInput').value.trim();
    if(!title) return slToast('Enter a title','error');
    const progWrap = document.getElementById('progWrap'), bar = document.getElementById('progBar');
    progWrap.style.display='block'; let p=0;
    const iv = setInterval(()=>{
      p+=10; bar.style.width = p+'%';
      if(p>=100){ clearInterval(iv);
        addDoc({category:cat, title, ...window._uploadData});
        slToast('Document uploaded successfully','success');
        setTimeout(()=>location.href = cat+'-'+(cat==='personal'?'documents':'certificates')+'.html', 700);
      }
    },80);
  });
  function resetUpload(){ previewWrap.style.display='none'; document.getElementById('progWrap').style.display='none'; document.getElementById('uploadMsg').textContent='Click to choose or drag a file here'; window._uploadData=null; }
</script>
</body></html>
