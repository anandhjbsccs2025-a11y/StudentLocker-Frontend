<!doctype html>
<html lang="en"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Notifications - Student Locker</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
<link href="assets/css/style.css" rel="stylesheet">
</head><body>
<div data-layout="student">
  <div class="page-header"><div><h2>Notifications</h2><p>Recent updates and alerts</p></div>
    <button class="btn btn-outline-primary" onclick="markAll()"><i class="fas fa-check-double me-1"></i>Mark all read</button></div>
  <div class="sl-card p-0" id="notifList"></div>
</div>
<script src="assets/js/app.js"></script><script src="assets/js/layout.js"></script>
<script>
  const seed = JSON.parse(localStorage.getItem('sl_notifs')||'null') || [
    {id:1, title:'Aadhaar uploaded', desc:'Your Aadhaar document was uploaded successfully.', date:'Today, 10:24 AM', read:false},
    {id:2, title:'Profile verified', desc:'Your profile has been verified by your teacher.', date:'Yesterday', read:false},
    {id:3, title:'New certificate available', desc:'Semester marksheet is now available.', date:'2 days ago', read:true},
  ];
  localStorage.setItem('sl_notifs', JSON.stringify(seed));
  function render(){
    const list = JSON.parse(localStorage.getItem('sl_notifs')||'[]');
    document.getElementById('notifList').innerHTML = list.map(n=>`
      <div class="notif-item ${n.read?'read':''}" onclick="toggleRead(${n.id})">
        <span class="dot"></span>
        <div class="flex-fill"><div class="fw-500">${n.title}</div>
          <div class="text-muted" style="font-size:.9rem">${n.desc}</div>
          <div class="meta mt-1">${n.date}</div></div>
        <span class="badge ${n.read?'bg-secondary':'bg-primary'}">${n.read?'Read':'New'}</span>
      </div>`).join('');
  }
  function toggleRead(id){
    const l = JSON.parse(localStorage.getItem('sl_notifs')||'[]');
    l.forEach(n=>{ if(n.id===id) n.read = !n.read });
    localStorage.setItem('sl_notifs', JSON.stringify(l)); render();
  }
  function markAll(){
    const l = JSON.parse(localStorage.getItem('sl_notifs')||'[]');
    l.forEach(n=>n.read=true); localStorage.setItem('sl_notifs', JSON.stringify(l)); render();
    slToast('All notifications marked as read','success');
  }
  render();
</script>
</body></html>
