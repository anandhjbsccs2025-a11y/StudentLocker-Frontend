<!doctype html>
<html lang="en"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Settings - Student Locker</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
<link href="assets/css/style.css" rel="stylesheet">
</head><body>
<div data-layout="student">
  <div class="page-header"><h2>Settings</h2><p>Customize your locker experience</p></div>
  <div class="sl-card mb-3">
    <h5>Appearance</h5>
    <div class="d-flex gap-2 mt-3">
      <button class="btn btn-outline-primary" onclick="slSetTheme('light');slToast('Light mode enabled','success')"><i class="fas fa-sun me-1"></i>Light</button>
      <button class="btn btn-outline-primary" onclick="slSetTheme('dark');slToast('Dark mode enabled','success')"><i class="fas fa-moon me-1"></i>Dark</button>
    </div>
  </div>
  <div class="sl-card mb-3">
    <h5>Language</h5>
    <select id="lang" class="form-select mt-2" style="max-width:280px">
      <option value="en">English</option><option value="hi">Hindi</option><option value="ta">Tamil</option><option value="te">Telugu</option>
    </select>
  </div>
  <div class="sl-card mb-3">
    <h5>Notifications</h5>
    <div class="form-check form-switch mt-2"><input id="notif" class="form-check-input" type="checkbox"><label class="form-check-label ms-2">Enable notifications</label></div>
  </div>
  <div class="sl-card">
    <h5>About</h5>
    <p class="text-muted mb-0">Student Details Locker v1.0 — A DigiLocker-inspired student portal for storing and managing academic documents securely.</p>
  </div>
</div>
<script src="assets/js/app.js"></script><script src="assets/js/layout.js"></script>
<script>
  const s = JSON.parse(localStorage.getItem('sl_settings')||'{}');
  const langEl = document.getElementById('lang'); const notif = document.getElementById('notif');
  if(s.lang) langEl.value = s.lang; if(s.notif !== undefined) notif.checked = s.notif;
  function save(){ localStorage.setItem('sl_settings', JSON.stringify({lang:langEl.value, notif:notif.checked})); slToast('Settings saved','success'); }
  langEl.addEventListener('change', save); notif.addEventListener('change', save);
</script>
</body></html>
