<!doctype html>
<html lang="en"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Profile - Student Locker</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
<link href="assets/css/style.css" rel="stylesheet"><link href="assets/css/dashboard.css" rel="stylesheet">
</head><body>
<div data-layout="student">
  <div class="page-header"><div><h2>My Profile</h2><p>Your personal information</p></div></div>
  <div class="sl-card">
    <div class="row g-4">
      <div class="col-md-3 text-center">
        <div class="sl-icon-circle" style="width:120px;height:120px;font-size:3.5rem;margin:0 auto"><i class="fas fa-user"></i></div>
        <h5 class="mt-3" id="pName">Student Name</h5>
        <span class="badge-verified"><i class="fas fa-check-circle me-1"></i>Verified</span>
      </div>
      <div class="col-md-9">
        <div class="row g-3">
          <div class="col-md-6"><small class="text-muted">Register Number</small><div id="pReg" class="fw-500">—</div></div>
          <div class="col-md-6"><small class="text-muted">Department</small><div id="pDept">CSE</div></div>
          <div class="col-md-6"><small class="text-muted">Class</small><div id="pCls">III-A</div></div>
          <div class="col-md-6"><small class="text-muted">UMIS Number</small><div id="pUmis">UMIS100001</div></div>
          <div class="col-md-6"><small class="text-muted">Email</small><div id="pEmail">—</div></div>
          <div class="col-md-6"><small class="text-muted">Mobile</small><div id="pMob">9000000000</div></div>
        </div>
        <div class="mt-4 d-flex gap-2 flex-wrap">
          <a href="edit-profile.html" class="btn btn-primary"><i class="fas fa-user-edit me-2"></i>Edit Profile</a>
          <a href="change-password.html" class="btn btn-outline-primary"><i class="fas fa-lock me-2"></i>Change Password</a>
          <a href="change-email.html" class="btn btn-outline-primary"><i class="fas fa-envelope me-2"></i>Change Email</a>
        </div>
      </div>
    </div>
  </div>
</div>
<script src="assets/js/app.js"></script><script src="assets/js/layout.js"></script>
<script>
  const u = JSON.parse(localStorage.getItem('sl_user')||'{}');
  const p = JSON.parse(localStorage.getItem('sl_profile')||'{}');
  document.getElementById('pName').textContent = p.name || u.name || 'Student Name';
  document.getElementById('pEmail').textContent = p.email || u.email || 'student@college.edu';
  if(p.reg) pReg.textContent = p.reg; if(p.dept) pDept.textContent = p.dept;
  if(p.cls) pCls.textContent = p.cls; if(p.umis) pUmis.textContent = p.umis;
  if(p.mob) pMob.textContent = p.mob;
</script>
</body></html>
