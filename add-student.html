<!doctype html>
<html lang="en"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Add Student - Student Locker</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
<link href="assets/css/style.css" rel="stylesheet">
</head><body>
<div data-layout="teacher">
  <div class="page-header"><h2>Add Student</h2></div>
  <form id="addStudentForm" class="sl-card">
    <div class="row g-3">
      <div class="col-md-6"><label class="form-label">Name</label><input name="name" class="form-control" required></div>
      <div class="col-md-6"><label class="form-label">Register Number</label><input name="reg" class="form-control" required></div>
      <div class="col-md-6"><label class="form-label">Department</label>
        <select name="dept" class="form-select"><option>CS</option><option>IT</option><option>AI&ML</option><option>BCA</option><option>BCOM</option><option>CSDA</option></option></select></div>
      <div class="col-md-6"><label class="form-label">Class</label><input name="cls" class="form-control"></div>
      <div class="col-md-6"><label class="form-label">UMIS Number</label><input name="umis" class="form-control"></div>
      <div class="col-md-6"><label class="form-label">Email</label><input name="email" type="email" class="form-control" required></div>
    </div>
    <div class="mt-4 d-flex gap-2 flex-wrap">
      <button class="btn btn-primary" type="submit"><i class="fas fa-save me-1"></i>Save</button>
      <button class="btn btn-outline-success" type="button" onclick="saveAndVerify()"><i class="fas fa-check me-1"></i>Save & Verify</button>
      <button class="btn btn-outline-secondary" type="reset">Reset</button>
    </div>
  </form>
</div>
<div class="modal fade" id="okModal" tabindex="-1"><div class="modal-dialog modal-dialog-centered"><div class="modal-content">
  <div class="modal-body text-center p-4">
    <div class="sl-icon-circle mx-auto" style="background:#dcfce7;color:#16a34a"><i class="fas fa-check"></i></div>
    <h5 class="mt-2">Student Saved</h5><p class="text-muted">The student has been added successfully.</p>
    <button class="btn btn-primary" data-bs-dismiss="modal">Continue</button>
  </div>
</div></div></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="assets/js/app.js"></script><script src="assets/js/layout.js"></script><script src="assets/js/dashboard.js"></script><script src="assets/js/validation.js"></script>
<script>
  const f = document.getElementById('addStudentForm');
  function saveStudent(verified){
    const d = Object.fromEntries(new FormData(f).entries());
    if(!d.name || !d.reg || !isEmail(d.email)) return slToast('Please complete all fields correctly','error');
    const list = getStudents();
    list.push({id:Date.now(), ...d, verified});
    saveStudents(list); f.reset();
    new bootstrap.Modal(document.getElementById('okModal')).show();
  }
  f.addEventListener('submit', e=>{ e.preventDefault(); saveStudent(false); });
  function saveAndVerify(){ if(f.checkValidity()) saveStudent(true); else f.reportValidity(); }
</script>
</body></html>
