<!doctype html>
<html lang="en"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Verify Student - Student Locker</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
<link href="assets/css/style.css" rel="stylesheet">
</head><body>
<div data-layout="teacher">
  <div class="page-header"><h2>Verify Student</h2></div>
  <div id="content"></div>
</div>
<script src="assets/js/app.js"></script><script src="assets/js/layout.js"></script><script src="assets/js/dashboard.js"></script>
<script>
  const id = +new URLSearchParams(location.search).get('id');
  const list = getStudents();
  const pending = list.filter(s=>!s.verified);
  const c = document.getElementById('content');
  function detailCard(s){
    return `<div class="sl-card" style="max-width:640px">
      <div class="d-flex justify-content-between align-items-start flex-wrap gap-2">
        <div>
          <div class="sl-icon-circle"><i class="fas fa-user"></i></div>
          <h4 class="mb-1">${s.name}</h4>
          <small class="text-muted">${s.reg} • ${s.dept}</small>
        </div>
        ${s.verified?'<span class="badge-verified">Verified</span>':'<span class="badge-pending">Pending</span>'}
      </div>
      <hr>
      <div class="row g-3">
        <div class="col-md-6"><small class="text-muted">Class</small><div>${s.cls||'-'}</div></div>
        <div class="col-md-6"><small class="text-muted">UMIS</small><div>${s.umis||'-'}</div></div>
        <div class="col-md-12"><small class="text-muted">Email</small><div>${s.email}</div></div>
      </div>
      <div class="mt-4 d-flex gap-2 flex-wrap">
        <button class="btn btn-success" onclick="act(${s.id},true)"><i class="fas fa-check me-1"></i>Verify</button>
        <button class="btn btn-outline-danger" onclick="act(${s.id},false,true)"><i class="fas fa-times me-1"></i>Reject</button>
        <button class="btn btn-link" onclick="history.back()">← Back</button>
      </div>
    </div>`;
  }
  function render(){
    if(id){
      const s = getStudents().find(x=>x.id===id);
      c.innerHTML = s ? detailCard(s) : '<p class="text-muted">Student not found.</p>';
    } else {
      c.innerHTML = pending.length
        ? '<p class="text-muted">Students awaiting verification</p>' + pending.map(detailCard).join('<div class="mb-3"></div>')
        : '<div class="sl-card text-center p-5"><i class="fas fa-check-circle fa-3x text-success mb-2"></i><h5>All students verified</h5></div>';
    }
  }
  function act(sid, verified, reject){
    const l = getStudents(); const s = l.find(x=>x.id===sid);
    if(!s) return;
    if(reject){ if(!confirm('Reject this student?')) return; s.verified=false; slToast('Student rejected','error'); }
    else { s.verified=true; slToast('Student verified','success'); }
    saveStudents(l); setTimeout(render, 300);
  }
  render();
</script>
</body></html>
